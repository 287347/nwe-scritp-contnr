name: Discord Notifier

on:
  push:
    paths:
      - 'chivae' # Si attiva solo quando modifichi questo file specifico

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Raw Content
        id: get_content
        run: |
          # Legge il contenuto del file 'chivae' e lo prepara per Discord
          CONTENT=$(cat chivae)
          echo "file_content=$CONTENT" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: "@here" # Aggiunge la notifica @here come nella foto
          username: "Key Updater"
          embed-color: 15548997 # Rosso scuro (come il bordo nell'immagine)
          embed-title: "🔒 | Key Updated!"
          embed-description: |
            **New Freemium Key:**
            ```
            ${{ steps.get_content.outputs.file_content }}
            ```
            **Key changes every week!** 🔔
